<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D手势粒子沉浸版</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; /* 纯黑背景更凸显粒子 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none; -webkit-tap-highlight-color: transparent;
        }
        #canvas-container {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;
        }
        video { display: none; }
        
        /* 极简呼吸灯提示语 */
        #status {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8); font-size: 13px; font-weight: 300; letter-spacing: 2px;
            z-index: 10; pointer-events: none; transition: opacity 1s ease;
            animation: breathe 2s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.4; } 50% { opacity: 1; }
        }

        /* 悬浮设置按钮 */
        #menu-btn {
            position: absolute; right: 25px; bottom: 35px; z-index: 20;
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: white; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #menu-btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.2); }
        
        /* iOS 极致毛玻璃面板 */
        #ui-panel {
            position: absolute; right: 20px; bottom: 95px; width: 280px;
            background: rgba(30, 30, 30, 0.4); /* 极高透明度暗色基底 */
            backdrop-filter: blur(25px) saturate(150%); /* iOS级别强烈模糊与色彩饱和 */
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px;
            padding: 24px; box-sizing: border-box; z-index: 15;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            /* 动画属性 */
            opacity: 0; transform: translateY(20px) scale(0.95); pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); /* 弹性动画 */
            transform-origin: bottom right;
        }

        /* 面板显示时的状态 */
        #ui-panel.show {
            opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
        }

        .ui-section { margin-bottom: 20px; }
        .ui-section:last-child { margin-bottom: 0; }
        .ui-label { 
            font-size: 13px; color: rgba(255,255,255,0.6); 
            margin-bottom: 12px; display: block; font-weight: 500;
        }
        
        .btn-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .btn {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9); padding: 12px 0; border-radius: 14px; 
            cursor: pointer; font-size: 13px; transition: all 0.2s; font-weight: 500;
        }
        .btn.active { 
            background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.3); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .color-row { display: flex; align-items: center; justify-content: space-between; }
        .color-picker-wrapper {
            width: 40px; height: 40px; border-radius: 50%; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
        }
        input[type="color"] { 
            width: 150%; height: 150%; transform: translate(-15%, -15%); border: none; cursor: pointer;
        }

        @media (max-width: 600px) {
            #menu-btn { right: 20px; bottom: max(30px, env(safe-area-inset-bottom)); }
            #ui-panel { right: 15px; left: 15px; width: auto; bottom: max(90px, calc(env(safe-area-inset-bottom) + 60px)); }
        }
    </style>
</head>
<body>

    <div id="status">唤醒 AI 引擎中...</div>
    <div id="canvas-container"></div>
    <video id="video" playsinline autoplay muted></video>

    <!-- 悬浮触发按钮 -->
    <div id="menu-btn">🪄</div>

    <!-- 隐藏的毛玻璃面板 -->
    <div id="ui-panel">
        <div class="ui-section">
            <span class="ui-label">粒子形态</span>
            <div class="btn-grid">
                <button class="btn active" data-shape="heart">❤️ 爱心</button>
                <button class="btn" data-shape="flower">🌸 花朵</button>
                <button class="btn" data-shape="saturn">🪐 土星</button>
                <button class="btn" data-shape="fireworks">🎆 烟花</button>
            </div>
        </div>

        <div class="ui-section color-row">
            <span class="ui-label" style="margin:0;">粒子颜色</span>
            <div class="color-picker-wrapper">
                <input type="color" id="color-picker" value="#ff3366">
            </div>
        </div>
    </div>

    <!-- 引入库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script>
        const PARTICLE_COUNT = 8000; 
        let currentShape = 'heart';
        let targetScale = 1.0;
        let currentScale = 1.0;
        let isHandDetected = false;
        
        // --- UI 逻辑控制 ---
        const menuBtn = document.getElementById('menu-btn');
        const uiPanel = document.getElementById('ui-panel');
        const canvasContainer = document.getElementById('canvas-container');

        // 点击按钮切换面板
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // 阻止事件冒泡
            uiPanel.classList.toggle('show');
        });

        // 点击空白处隐藏面板 (完美沉浸体验)
        canvasContainer.addEventListener('touchstart', () => { uiPanel.classList.remove('show'); });
        canvasContainer.addEventListener('mousedown', () => { uiPanel.classList.remove('show'); });
        uiPanel.addEventListener('click', (e) => e.stopPropagation());

        // --- Three.js 初始化 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.002);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 150;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        canvasContainer.appendChild(renderer.domElement);

        function generatePositions(shape) {
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let x, y, z;
                if (shape === 'heart') {
                    const t = Math.random() * Math.PI * 2, r = Math.random() * 2 + 0.5;
                    x = 16 * Math.pow(Math.sin(t), 3) * (r*0.6) * 3;
                    y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * (r*0.6) * 3;
                    z = (Math.random() - 0.5) * 10;
                } else if (shape === 'flower') {
                    const t = Math.random() * Math.PI * 2, p = Math.random(), r = Math.cos(5 * t) * p * 60;
                    x = r * Math.cos(t); y = r * Math.sin(t); z = (Math.random() - 0.5) * 15;
                } else if (shape === 'saturn') {
                    if (Math.random() > 0.6) {
                        const theta = Math.random() * Math.PI * 2, phi = Math.acos(Math.random() * 2 - 1), r = Math.cbrt(Math.random()) * 25;
                        x = r * Math.sin(phi) * Math.cos(theta); y = r * Math.sin(phi) * Math.sin(theta); z = r * Math.cos(phi);
                    } else {
                        const t = Math.random() * Math.PI * 2, r = 35 + Math.random() * 25;
                        x = r * Math.cos(t); y = (Math.random() - 0.5) * 2; z = r * Math.sin(t);
                    }
                    const tempY = y * Math.cos(0.4) - z * Math.sin(0.4), tempZ = y * Math.sin(0.4) + z * Math.cos(0.4);
                    y = tempY; z = tempZ;
                } else if (shape === 'fireworks') {
                    const theta = Math.random() * Math.PI * 2, phi = Math.acos(Math.random() * 2 - 1), r = Math.pow(Math.random(), 1.5) * 80; 
                    x = r * Math.sin(phi) * Math.cos(theta); y = r * Math.sin(phi) * Math.sin(theta); z = r * Math.cos(phi);
                }
                positions[i * 3] = x; positions[i * 3 + 1] = y; positions[i * 3 + 2] = z;
            }
            return positions;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(generatePositions('heart'), 3));
        geometry.setAttribute('aTarget', new THREE.BufferAttribute(new Float32Array(generatePositions('heart')), 3));

        const material = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 }, uMorphProgress: { value: 0 }, uScale: { value: 1.0 }, uColor: { value: new THREE.Color('#ff3366') } },
            vertexShader: `
                uniform float uTime; uniform float uMorphProgress; uniform float uScale; attribute vec3 aTarget;
                void main() {
                    vec3 mixedPos = mix(position, aTarget, uMorphProgress);
                    mixedPos *= uScale;
                    mixedPos.y += sin(uTime * 2.0 + mixedPos.x * 0.05) * 2.0;
                    mixedPos.x += cos(uTime * 1.5 + mixedPos.y * 0.05) * 2.0;
                    vec4 mvPosition = modelViewMatrix * vec4(mixedPos, 1.0);
                    gl_PointSize = 3.0 * (150.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }`,
            fragmentShader: `
                uniform vec3 uColor;
                void main() {
                    vec2 xy = gl_PointCoord.xy - vec2(0.5);
                    if(length(xy) > 0.5) discard;
                    gl_FragColor = vec4(uColor, (0.5 - length(xy)) * 2.0 * 0.8);
                }`,
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        let morphing = false;
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                const shape = e.target.getAttribute('data-shape');
                if (shape === currentShape) return;
                currentShape = shape;
                geometry.attributes.aTarget.array.set(generatePositions(shape));
                geometry.attributes.aTarget.needsUpdate = true;
                material.uniforms.uMorphProgress.value = 0.0;
                morphing = true;
            });
        });

        document.getElementById('color-picker').addEventListener('input', (e) => {
            material.uniforms.uColor.value.set(e.target.value);
        });

        // --- AI 手势识别 ---
        const videoElement = document.getElementById('video');
        const statusEl = document.getElementById('status');

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks;
                
                // 当手进入画面时，如果是第一次，自动隐藏面板
                if (!isHandDetected) {
                    isHandDetected = true;
                    uiPanel.classList.remove('show');
                }

                if (landmarks.length === 2) {
                    targetScale = Math.min(Math.max(getDistance(landmarks[0][0], landmarks[1][0]) * 3.5, 0.3), 4.0);
                } else if (landmarks.length === 1) {
                    targetScale = Math.min(Math.max(getDistance(landmarks[0][4], landmarks[0][8]) * 5.0, 0.4), 2.5);
                }
            } else { 
                targetScale = 1.0; 
                isHandDetected = false;
            }
        });

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } })
            .then((stream) => {
                videoElement.srcObject = stream; videoElement.play();
                statusEl.innerText = "正在激活沉浸模式...";
                async function processVideoFrame() {
                    if (!videoElement.paused && !videoElement.ended) {
                        await hands.send({image: videoElement});
                        statusEl.style.opacity = '0'; // 识别成功后，提示文字彻底消失
                    }
                    requestAnimationFrame(processVideoFrame);
                }
                videoElement.onloadeddata = processVideoFrame;
            }).catch(() => { statusEl.innerText = "需允许相机权限"; });

        // --- 渲染循环 ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            currentScale += (targetScale - currentScale) * 0.15;
            material.uniforms.uScale.value = currentScale;

            if (morphing) {
                material.uniforms.uMorphProgress.value += clock.getDelta() * 1.5;
                if (material.uniforms.uMorphProgress.value >= 1.0) {
                    material.uniforms.uMorphProgress.value = 1.0; morphing = false;
                    geometry.attributes.position.array.set(geometry.attributes.aTarget.array);
                    geometry.attributes.position.needsUpdate = true;
                    material.uniforms.uMorphProgress.value = 0.0;
                }
            }
            material.uniforms.uTime.value = clock.getElapsedTime();
            particles.rotation.y = clock.getElapsedTime() * 0.1;
            particles.rotation.x = Math.sin(clock.getElapsedTime() * 0.2) * 0.1;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
