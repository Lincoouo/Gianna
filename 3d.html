<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手机端 - 3D手势粒子交互</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050505; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none; /* 防止手机端滑动页面 */
        }
        #canvas-container {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;
        }
        video { display: none; }
        
        /* 移动端响应式 UI 面板 */
        #ui-panel {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 260px; background: rgba(20, 20, 22, 0.75);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
            padding: 20px; box-sizing: border-box; z-index: 10; color: #fff;
        }

        /* 手机端样式覆盖：放在屏幕底部 */
        @media (max-width: 768px) {
            #ui-panel {
                top: auto; bottom: 0; right: 0; left: 0; transform: none;
                width: 100%; border-radius: 20px 20px 0 0;
                padding: 15px; padding-bottom: max(15px, env(safe-area-inset-bottom));
                max-height: 40vh; overflow-y: auto;
            }
            #status { font-size: 12px !important; }
        }

        .ui-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; text-align: center; }
        .ui-section { margin-bottom: 15px; }
        .ui-label { font-size: 12px; color: #aaa; margin-bottom: 8px; display: block; }
        
        /* 按钮使用横向滑动，节省手机空间 */
        .btn-scroll-container {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px;
            scrollbar-width: none; /* Firefox */
        }
        .btn-scroll-container::-webkit-scrollbar { display: none; /* Chrome */ }
        
        .btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer;
            white-space: nowrap; transition: all 0.2s; font-size: 13px;
        }
        .btn.active { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.4); }
        
        .color-picker-container { display: flex; align-items: center; gap: 10px; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 30px; height: 30px; border-radius: 50%; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

        #status {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            color: #4a90e2; font-size: 14px; background: rgba(0,0,0,0.6);
            padding: 8px 12px; border-radius: 20px; backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div id="status">请求摄像头中(需HTTPS环境)...</div>
    <div id="canvas-container"></div>
    <!-- playsinline 是必须的，防止 iOS Safari 自动全屏播放视频 -->
    <video id="video" playsinline autoplay muted></video>

    <div id="ui-panel">
        <div class="ui-title">粒子控制面板</div>
        
        <div class="ui-section">
            <span class="ui-label">选择形态 (可左右滑动)</span>
            <div class="btn-scroll-container">
                <button class="btn active" data-shape="heart">❤️ 爱心</button>
                <button class="btn" data-shape="flower">🌸 花朵</button>
                <button class="btn" data-shape="saturn">🪐 土星</button>
                <button class="btn" data-shape="christ">✝️ 基督像</button>
                <button class="btn" data-shape="fireworks">🎆 烟花</button>
            </div>
        </div>

        <div class="ui-section">
            <span class="ui-label">粒子颜色</span>
            <div class="color-picker-container">
                <input type="color" id="color-picker" value="#ff3366">
                <span id="color-hex" style="font-size: 13px;">#ff3366</span>
            </div>
        </div>
        <p style="font-size: 11px; color: #888; text-align: center; margin: 5px 0 0 0;">
            *对准前置摄像头，单手捏合控制缩放
        </p>
    </div>

    <!-- 引入库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script>
        // 手机端适当降低粒子数以保证 60FPS 和防止发烫
        const PARTICLE_COUNT = 8000; 
        let currentShape = 'heart';
        let targetScale = 1.0;
        let currentScale = 1.0;
        
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.002);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 150;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // 限制像素比，降低手机端的高分屏压力
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        container.appendChild(renderer.domElement);

        function generatePositions(shape) {
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let x, y, z;
                if (shape === 'heart') {
                    const t = Math.random() * Math.PI * 2;
                    const r = Math.random() * 2 + 0.5;
                    x = 16 * Math.pow(Math.sin(t), 3) * (r*0.6) * 3;
                    y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * (r*0.6) * 3;
                    z = (Math.random() - 0.5) * 10;
                } else if (shape === 'flower') {
                    const t = Math.random() * Math.PI * 2;
                    const p = Math.random();
                    const r = Math.cos(5 * t) * p * 60;
                    x = r * Math.cos(t); y = r * Math.sin(t); z = (Math.random() - 0.5) * 15;
                } else if (shape === 'saturn') {
                    if (Math.random() > 0.6) {
                        const theta = Math.random() * Math.PI * 2, phi = Math.acos(Math.random() * 2 - 1);
                        const r = Math.cbrt(Math.random()) * 25;
                        x = r * Math.sin(phi) * Math.cos(theta); y = r * Math.sin(phi) * Math.sin(theta); z = r * Math.cos(phi);
                    } else {
                        const t = Math.random() * Math.PI * 2, r = 35 + Math.random() * 25;
                        x = r * Math.cos(t); y = (Math.random() - 0.5) * 2; z = r * Math.sin(t);
                    }
                    const tempY = y * Math.cos(0.4) - z * Math.sin(0.4), tempZ = y * Math.sin(0.4) + z * Math.cos(0.4);
                    y = tempY; z = tempZ;
                } else if (shape === 'christ') {
                    if (Math.random() < 0.65) {
                        x = (Math.random() - 0.5) * 10; y = (Math.random() - 0.5) * 100; z = (Math.random() - 0.5) * 10;
                    } else {
                        x = (Math.random() - 0.5) * 80; y = 15 + (Math.random() - 0.5) * 8; z = (Math.random() - 0.5) * 8;
                    }
                } else if (shape === 'fireworks') {
                    const theta = Math.random() * Math.PI * 2, phi = Math.acos(Math.random() * 2 - 1);
                    const r = Math.pow(Math.random(), 1.5) * 80; 
                    x = r * Math.sin(phi) * Math.cos(theta); y = r * Math.sin(phi) * Math.sin(theta); z = r * Math.cos(phi);
                }
                positions[i * 3] = x; positions[i * 3 + 1] = y; positions[i * 3 + 2] = z;
            }
            return positions;
        }

        const geometry = new THREE.BufferGeometry();
        const currentPos = generatePositions('heart');
        const targetPos = new Float32Array(currentPos);
        geometry.setAttribute('position', new THREE.BufferAttribute(currentPos, 3));
        geometry.setAttribute('aTarget', new THREE.BufferAttribute(targetPos, 3));

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 }, uMorphProgress: { value: 0 }, uScale: { value: 1.0 }, uColor: { value: new THREE.Color('#ff3366') }
            },
            vertexShader: `
                uniform float uTime; uniform float uMorphProgress; uniform float uScale; attribute vec3 aTarget;
                void main() {
                    vec3 mixedPos = mix(position, aTarget, uMorphProgress);
                    mixedPos *= uScale;
                    mixedPos.y += sin(uTime * 2.0 + mixedPos.x * 0.05) * 2.0;
                    mixedPos.x += cos(uTime * 1.5 + mixedPos.y * 0.05) * 2.0;
                    vec4 mvPosition = modelViewMatrix * vec4(mixedPos, 1.0);
                    // 手机端由于屏幕小，点的大小适当改小
                    gl_PointSize = 3.0 * (150.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 uColor;
                void main() {
                    vec2 xy = gl_PointCoord.xy - vec2(0.5);
                    float ll = length(xy);
                    if(ll > 0.5) discard;
                    gl_FragColor = vec4(uColor, (0.5 - ll) * 2.0 * 0.8);
                }
            `,
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        let morphing = false;
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                const shape = e.target.getAttribute('data-shape');
                if (shape === currentShape) return;
                currentShape = shape;
                geometry.attributes.aTarget.array.set(generatePositions(shape));
                geometry.attributes.aTarget.needsUpdate = true;
                material.uniforms.uMorphProgress.value = 0.0;
                morphing = true;
            });
        });

        document.getElementById('color-picker').addEventListener('input', (e) => {
            document.getElementById('color-hex').textContent = e.target.value;
            material.uniforms.uColor.value.set(e.target.value);
        });

        // 移动端：手动调用摄像头，强制前置摄像头
        const videoElement = document.getElementById('video');
        const statusEl = document.getElementById('status');

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 0, // 手机端使用复杂度0的模型，提升运行速度防止卡顿
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks;
                if (landmarks.length === 2) {
                    let dist = getDistance(landmarks[0][0], landmarks[1][0]);
                    targetScale = Math.min(Math.max(dist * 3.5, 0.3), 4.0);
                } else if (landmarks.length === 1) {
                    let dist = getDistance(landmarks[0][4], landmarks[0][8]);
                    targetScale = Math.min(Math.max(dist * 5.0, 0.4), 2.5);
                }
            } else { targetScale = 1.0; }
        });

        // 手动请求摄像头流 (兼容手机前置)
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: 640, height: 480 }
        }).then((stream) => {
            videoElement.srcObject = stream;
            videoElement.play();
            statusEl.innerText = "加载AI模型中...";
            
            // 视频帧处理循环
            async function processVideoFrame() {
                if (!videoElement.paused && !videoElement.ended) {
                    await hands.send({image: videoElement});
                    statusEl.style.display = 'none'; // 成功识别后隐藏提示
                }
                requestAnimationFrame(processVideoFrame);
            }
            videoElement.onloadeddata = processVideoFrame;

        }).catch((err) => {
            statusEl.innerText = "相机开启失败，请在浏览器允许权限并使用HTTPS";
            console.error("Camera error:", err);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            currentScale += (targetScale - currentScale) * 0.15;
            material.uniforms.uScale.value = currentScale;

            if (morphing) {
                material.uniforms.uMorphProgress.value += delta * 1.5;
                if (material.uniforms.uMorphProgress.value >= 1.0) {
                    material.uniforms.uMorphProgress.value = 1.0;
                    morphing = false;
                    geometry.attributes.position.array.set(geometry.attributes.aTarget.array);
                    geometry.attributes.position.needsUpdate = true;
                    material.uniforms.uMorphProgress.value = 0.0;
                }
            }
            material.uniforms.uTime.value = clock.getElapsedTime();
            particles.rotation.y = clock.getElapsedTime() * 0.1;
            particles.rotation.x = Math.sin(clock.getElapsedTime() * 0.2) * 0.1;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
